{% extends 'layout.html' %} {% block body %}




<div class="container py-5" style="margin-top:6rem;">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card shadow-lg border-0 recommendation-card">
        <div class="card-body text-center p-5">

          <!-- Icon -->
          <div class="mb-3">
            <i class="fas fa-seedling" style="font-size:50px; color:#2e7d32;"></i>
          </div>

          <!-- Title -->
          <h3 class="mb-3" style="color:#2e7d32; font-weight:600;">
            Crop Recommendation
          </h3>

          <!-- Result -->
          <p class="recommend-text">
            {{ recommendation }}
          </p>

        </div>
      </div>

    </div>
  </div>
</div>

<style>
.recommendation-card{
    background: linear-gradient(135deg,#e8f5e9,#fffde7);
    border-radius: 20px;
    transition: 0.3s;
}

.recommendation-card:hover{
    transform: translateY(-8px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
}

.recommend-text{
    font-size:22px;
    color:#333;
    font-weight:500;
    background:#ffffff;
    padding:15px;
    border-radius:10px;
    display:inline-block;
}
</style>
{% endblock %}
